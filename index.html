<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>鬼アーカイブ</title>

<style>

body{
background:linear-gradient(180deg,#140028,#2a0055);
color:white;
font-family:sans-serif;
text-align:center;
overflow-x:hidden;
}

#title{
width:500px;
margin-top:20px;
}

button{
background:linear-gradient(45deg,#8a2be2,#ff00ff);
border:none;
padding:15px 30px;
font-size:20px;
border-radius:10px;
color:white;
cursor:pointer;
margin:10px;
transition:0.2s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px violet;
}

#results{
display:flex;
justify-content:center;
gap:20px;
margin-top:30px;
}

.card{
width:170px;
height:240px;
perspective:1000px;
}

.inner{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
transition:transform 0.8s;
}

.flip{
transform:rotateY(180deg);
}

.front,.back{
position:absolute;
width:100%;
height:100%;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
backface-visibility:hidden;
}

.front{
background:#222;
font-size:40px;
}

.back{
background:#333;
transform:rotateY(180deg);
padding:10px;
}

.charImg{
width:110px;
height:110px;
object-fit:contain;
margin-bottom:5px;
}

.ssr{box-shadow:0 0 30px gold;}

.ur{animation:rainbow 2s infinite linear;}

@keyframes rainbow{
0%{filter:hue-rotate(0deg)}
100%{filter:hue-rotate(360deg)}
}

.or{animation:explode 1s infinite;}

@keyframes explode{
0%{box-shadow:0 0 10px red}
50%{box-shadow:0 0 60px red}
100%{box-shadow:0 0 10px red}
}

#collection{
margin-top:40px;
display:grid;
grid-template-columns:repeat(6,110px);
justify-content:center;
gap:10px;
}

.slot{
background:#333;
height:110px;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
border-radius:6px;
font-size:12px;
}

.slot img{
width:60px;
height:60px;
object-fit:contain;
}

.lock{opacity:0.25;}

#rate{
margin-top:10px;
font-size:18px;
}

#effect{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
overflow:hidden;
}

.effectChar{
width:420px;
animation:pop 0.6s ease;
z-index:2;
}

@keyframes pop{
0%{transform:scale(0);filter:brightness(4)}
70%{transform:scale(1.2)}
100%{transform:scale(1)}
}

.flash{
position:absolute;
width:100%;
height:100%;
background:white;
opacity:0;
animation:flash 0.4s;
}

@keyframes flash{
0%{opacity:1}
100%{opacity:0}
}

.rainbowBurst{
position:absolute;
width:120%;
height:120%;
background:conic-gradient(red,orange,yellow,green,cyan,blue,violet,red);
opacity:0.4;
animation:spin 3s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.explosion{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle,red,transparent);
opacity:0.6;
animation:explode2 1s;
}

@keyframes explode2{
0%{transform:scale(0)}
100%{transform:scale(2)}
}

.shake{animation:shake 0.5s;}

@keyframes shake{
0%{transform:translate(0)}
25%{transform:translate(-10px,5px)}
50%{transform:translate(10px,-5px)}
75%{transform:translate(-10px,5px)}
100%{transform:translate(0)}
}

.particle{
position:absolute;
width:8px;
height:8px;
background:white;
border-radius:50%;
animation:particleMove 1s linear forwards;
}

@keyframes particleMove{
0%{transform:translate(0,0);opacity:1;}
100%{transform:translate(var(--x),var(--y));opacity:0;}
}

</style>
</head>

<body>

<div id="effect"></div>

<h1><img src="title.png" id="title"></h1>

<button onclick="draw(1)">1回ガチャ</button>
<button onclick="draw(10)">10連ガチャ</button>

<div id="results"></div>

<h2>図鑑</h2>

<div id="rate"></div>
<div id="collection"></div>

<script>

const characters=[

{name:"おに",rarity:"N",img:"character.png"},
{name:"あの頃のおに",rarity:"N",img:"young.png"},
{name:"おに猫",rarity:"N",img:"neko.png"},
{name:"おに犬",rarity:"N",img:"inu.png"},
{name:"新卒おに",rarity:"N",img:"suits.png"},
{name:"わけありおに",rarity:"N",img:"wakeari.png"},
{name:"となかいおに",rarity:"N",img:"tonakai.png"},
{name:"七五三おに",rarity:"N",img:"7.png"},
{name:"バレンタインおに",rarity:"N",img:"choco.png"},
{name:"クリスマスおに",rarity:"N",img:"christmas.png"},
{name:"社畜おに",rarity:"N",img:"busy.png"},
{name:"おにカフェ店員",rarity:"N",img:"coffee.png"},
{name:"おに画家",rarity:"N",img:"painter.png"},
{name:"おにとり",rarity:"N",img:"tori.png"},
{name:"おにマッチョ",rarity:"N",img:"kinniku.png"},
{name:"おに棋士",rarity:"N",img:"kishi.png"},
{name:"おにチャイナ",rarity:"N",img:"china.png"},
{name:"おにバントマン",rarity:"N",img:"band.png"},
{name:"おにメカニック",rarity:"N",img:"meka.png"},
{name:"おにシェフ",rarity:"N",img:"chef.png"},
{name:"おに消防士",rarity:"N",img:"fire.png"},
{name:"おに転売ヤー",rarity:"N",img:"tenbai.png"},
{name:"オタクおに",rarity:"N",img:"otaku.png"},
{name:"ゾンビおに",rarity:"N",img:"zombi.png"},
{name:"深海おに",rarity:"N",img:"shinkai.png"},






{name:"おに宇宙飛行士",rarity:"R",img:"sora.png"},
{name:"おにナイト",rarity:"R",img:"knights.png"},
{name:"サイバーおに",rarity:"R",img:"cyber.png"},
{name:"ゆめかわおに",rarity:"R",img:"hime.png"},
{name:"タイおに",rarity:"R",img:"thai.png"},
{name:"おにインド",rarity:"R",img:"indo.png"},
{name:"おにインド2",rarity:"R",img:"indo2.png"},
{name:"エジプトおに",rarity:"R",img:"egypt.png"},
{name:"おにパンク",rarity:"R",img:"punk.png"},
{name:"おにマジシャン",rarity:"R",img:"magic.png"},
{name:"おにレーサー",rarity:"R",img:"Racer.png"},
{name:"名探偵おに",rarity:"R",img:"tantei.png"},
{name:"鬼塚",rarity:"R",img:"onizuka.png"},
{name:"DJおに",rarity:"R",img:"dj.png"},
{name:"迷惑配信者",rarity:"R",img:"meiwaku.png"},




{name:"ホスト",rarity:"SR",img:"host.png"},
{name:"鬼武将",rarity:"SR",img:"busho.png"},
{name:"ゴスロリおに",rarity:"SR",img:"gosurori.png"},
{name:"オニタン",rarity:"SR",img:"apex.png"},
{name:"タキシードおに",rarity:"SR",img:"Tuxedo.png"},
{name:"オニロット",rarity:"SR",img:"gokuu.png"},
{name:"おにまーきゅりー",rarity:"SR",img:"sailor.png"},
{name:"進撃の鬼",rarity:"SR",img:"shin.png"},
{name:"フィクサー",rarity:"SR",img:"fixer.png"},
{name:"名探偵",rarity:"SR",img:"meitan.png"},
{name:"おにバイキング",rarity:"SR",img:"viking.png"},






{name:"新世界の鬼",rarity:"SSR",img:"note.png"},
{name:"オニピカソ",rarity:"SSR",img:"pikaso.png"},
{name:"はんしゃおに",rarity:"SSR",img:"yakuza.png"},
{name:"ライバーおに",rarity:"SSR",img:"tiktok.png"},
{name:"特別課外活動おに",rarity:"SSR",img:"persona.png"},
{name:"聖杯のおに",rarity:"SSR",img:"fate.png"},
{name:"おに娘",rarity:"SSR",img:"uammu.png"},
{name:"鬼将軍",rarity:"SSR",img:"samurai.png"},
{name:"鬼船長",rarity:"SSR",img:"pirates.png"},
{name:"鬼団長",rarity:"SSR",img:"circus.png"},




{name:"おにメイド",rarity:"UR",img:"maid.png"},
{name:"おにガキ",rarity:"UR",img:"mesugaki.png"},
{name:"おにエンジェル",rarity:"UR",img:"angel.png"},
{name:"おにデビル",rarity:"UR",img:"devil.png"},
{name:"オニサタン",rarity:"SSR",img:"satan.png"},
{name:"タイムトラベラーおに",rarity:"UR",img:"toki.png"},
{name:"成金おに",rarity:"UR",img:"oninari.png"},
{name:"オニモンマスター",rarity:"UR",img:"satoshi.png"},



{name:"鬼神オリジン",rarity:"OR",img:"origin.gif"}

]

const rates={
N:62,
R:28,
SR:5,
SSR:4.7,
UR:0.25,
OR:0.05
}

let collection=JSON.parse(localStorage.getItem("oniCollection"))||[]

function getRarity(){

let rand=Math.random()*100
let sum=0

for(let r in rates){
sum+=rates[r]
if(rand<sum)return r
}

}

function getChar(){

let rarity=getRarity()

let pool=characters.filter(c=>c.rarity==rarity)

return pool[Math.floor(Math.random()*pool.length)]

}

function draw(count){

const results=document.getElementById("results")
results.innerHTML=""

let pulled=[]

// ★3連のとき高速化
let interval = count===10 ? 250 : 700
let flipSpeed = count===10 ? 80 : 200

for(let i=0;i<count;i++){

setTimeout(()=>{

let char=getChar()

pulled.push(char)

if(!collection.includes(char.name)){
collection.push(char.name)
localStorage.setItem("oniCollection",JSON.stringify(collection))
}

let card=document.createElement("div")
card.className="card"

card.innerHTML=`

<div class="inner">

<div class="back ${char.rarity.toLowerCase()}">

<img src="${char.img}" class="charImg">
<h3>${char.rarity}</h3>
<p>${char.name}</p>

</div>

</div>

`

results.appendChild(card)

// ★めくり速度変更
setTimeout(()=>{
card.querySelector(".inner").classList.add("flip")
},flipSpeed)

updateCollection()

// 最後のカードだけ演出
if(i===count-1){

setTimeout(()=>{

let rare=getHighestRarity(pulled)
playEffect(rare)

},300)

}

},i*interval)

}

}

function getHighestRarity(chars){

const order={
N:1,
R:2,
SR:3,
SSR:4,
UR:5,
OR:6
}

let best=chars[0]

chars.forEach(c=>{
if(order[c.rarity] > order[best.rarity]){
best=c
}
})

return best

}

function playEffect(char){

let effect=document.getElementById("effect")
effect.innerHTML=""

if(char.rarity=="SSR"){

effect.innerHTML=`
<div class="flash"></div>
<div class="rainbowBurst"></div>
<img src="${char.img}" class="effectChar">
`

spawnParticles(60)

}

if(char.rarity=="UR"){

effect.innerHTML=`
<div class="flash"></div>
<div class="rainbowBurst"></div>
<img src="${char.img}" class="effectChar">
`

document.body.classList.add("shake")

spawnParticles(80)

setTimeout(()=>document.body.classList.remove("shake"),600)

}

if(char.rarity=="OR"){

effect.innerHTML=`
<div class="flash"></div>
<div class="rainbowBurst"></div>
<div class="explosion"></div>
<img src="${char.img}" class="effectChar">
`

document.body.classList.add("shake")

spawnParticles(150)

setTimeout(()=>document.body.classList.remove("shake"),1000)

}

setTimeout(()=>effect.innerHTML="",2000)

}

function spawnParticles(count){

let effect=document.getElementById("effect")

for(let i=0;i<count;i++){

let p=document.createElement("div")
p.className="particle"

let x=(Math.random()*800-400)+"px"
let y=(Math.random()*800-400)+"px"

p.style.setProperty("--x",x)
p.style.setProperty("--y",y)

effect.appendChild(p)

}

}

function updateCollection(){

let col=document.getElementById("collection")
col.innerHTML=""

characters.forEach(c=>{

let div=document.createElement("div")
div.className="slot"

if(collection.includes(c.name)){

div.innerHTML=`<img src="${c.img}"><br>${c.name}`

}else{

div.classList.add("lock")
div.innerHTML="???"

}

col.appendChild(div)

})

let rate=Math.floor(collection.length/characters.length*100)

document.getElementById("rate").innerText=
"コンプリート率 "+collection.length+" / "+characters.length+" ("+rate+"%)"

}

updateCollection()

</script>

</body>
</html>
